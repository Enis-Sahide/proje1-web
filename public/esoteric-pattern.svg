<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <g stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.8">
    <!-- Center: Seed of Life / Sacred Geometry -->
    <g transform="translate(200, 200)">
      <circle cx="0" cy="0" r="40" />
      <circle cx="0" cy="-40" r="40" />
      <circle cx="34.64" cy="-20" r="40" />
      <circle cx="34.64" cy="20" r="40" />
      <circle cx="0" cy="40" r="40" />
      <circle cx="-34.64" cy="20" r="40" />
      <circle cx="-34.64" cy="-20" r="40" />
    </g>

    <!-- Top Left: Crescent Moon and Star -->
    <g transform="translate(60, 60)">
      <path d="M10,-15 A20,20 0 1,0 15,10 A15,15 0 1,1 10,-15 Z" />
      <circle cx="-5" cy="-5" r="2" fill="#D4AF37" />
    </g>

    <!-- Top Right: Eye of Horus / Mystical Eye -->
    <g transform="translate(340, 60)">
      <path d="M-20,0 Q0,-15 20,0 Q0,15 -20,0" />
      <circle cx="0" cy="0" r="6" />
      <circle cx="0" cy="0" r="2" fill="#D4AF37" />
    </g>

    <!-- Bottom Left: Sri Yantra simplified / Triangles -->
    <g transform="translate(60, 340)">
      <polygon points="0,-20 20,15 -20,15" />
      <polygon points="0,20 20,-15 -20,-15" />
      <circle cx="0" cy="0" r="25" />
    </g>

    <!-- Bottom Right: Lotus Flower -->
    <g transform="translate(340, 340)">
      <path d="M0,20 C-20,20 -30,0 0,-20 C30,0 20,20 0,20 Z" />
      <path d="M0,20 C-40,10 -30,-10 0,-20 C30,-10 40,10 0,20 Z" />
    </g>

    <!-- Center Left: Alchemy Symbol (Earth) -->
    <g transform="translate(60, 200)">
      <polygon points="0,20 20,-15 -20,-15" />
      <line x1="-15" y1="5" x2="15" y2="5" />
    </g>

    <!-- Center Right: Alchemy Symbol (Air) -->
    <g transform="translate(340, 200)">
      <polygon points="0,-20 20,15 -20,15" />
      <line x1="-15" y1="-5" x2="15" y2="-5" />
    </g>

    <!-- Top Center: Sun / Astrological -->
    <g transform="translate(200, 60)">
      <circle cx="0" cy="0" r="15" />
      <circle cx="0" cy="0" r="3" fill="#D4AF37" />
      <line x1="0" y1="-20" x2="0" y2="-25" />
      <line x1="0" y1="20" x2="0" y2="25" />
      <line x1="-20" y1="0" x2="-25" y2="0" />
      <line x1="20" y1="0" x2="25" y2="0" />
      <line x1="-14" y1="-14" x2="-18" y2="-18" />
      <line x1="14" y1="14" x2="18" y2="18" />
      <line x1="-14" y1="14" x2="-18" y2="18" />
      <line x1="14" y1="-14" x2="18" y2="-18" />
    </g>

    <!-- Bottom Center: Infinity / Lemniscate -->
    <g transform="translate(200, 340)">
      <path d="M-15,0 C-15,-10 -5,-10 0,0 C5,10 15,10 15,0 C15,-10 5,-10 0,0 C-5,10 -15,10 -15,0 Z" />
    </g>
  </g>
</svg>
